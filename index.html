<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>心动的信号</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #f3d9c2;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    /* 手机卡片容器 */
    .phone-frame {
      width: 375px;
      height: 667px;
      background: #fff5e8;
      border-radius: 40px;
      overflow: hidden;
      box-shadow: 0 30px 50px rgba(90, 50, 20, 0.3);
      position: relative;
      display: flex;
      flex-direction: column;
      border: 6px solid #f2cfb0;
    }

    /* 固定头部 */
    .app-header {
      background: #ffb6c1;
      padding: 24px 0 12px;
      text-align: center;
      color: white;
      font-size: 26px;
      font-weight: bold;
      letter-spacing: 4px;
      text-shadow: 2px 2px 0 #f08a9d;
      flex-shrink: 0;
    }

    .sub-header {
      background: #fce2c1;
      padding: 5px;
      text-align: center;
      font-size: 13px;
      color: #b45f3a;
      border-bottom: 1px dashed #dba978;
      flex-shrink: 0;
    }

    /* 页面容器 (滑动区域) */
    .page-container {
      flex: 1;
      overflow-y: auto;
      position: relative;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    /* 两个页面 (首页 / 添加页) 通过切换类显示 */
    .page {
      display: none;
      padding: 18px 16px 30px;
      min-height: 100%;
    }

    .page.active {
      display: block;
    }

    /* ---------- 首页抽签 ---------- */
    .bucket-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 20px;
      position: relative;
      cursor: pointer;
      user-select: none;
    }

    .bucket {
      position: relative;
      width: 280px;
      height: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
    }

    /* 约会聊天卡通图案：情侣+爱心+对话气泡的感觉 */
    .bucket-emoji {
      font-size: 130px;
      line-height: 1;
      margin-bottom: -20px;
      filter: drop-shadow(0 8px 10px rgba(200, 120, 80, 0.4));
      background: rgba(255, 230, 210, 0.5);
      padding: 15px 25px;
      border-radius: 80px 80px 40px 40px;
      border: 3px solid #ffb7a5;
      transform: rotate(-2deg);
      box-shadow: 0 10px 0 #d88f70;
    }

    /* 添加一点小爱心点缀 */
    .bucket-emoji::after {
      content: "💬💕";
      font-size: 30px;
      position: relative;
      top: -20px;
      right: -30px;
      opacity: 0.8;
    }
	
	.bucket-image {
	  width: 260px;
	  height: auto;
	  max-width: 100%;
	  border-radius: 40px;
	  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
	  margin-bottom: 10px;
	  border: 4px solid #ffb7a5;
	  object-fit: cover; /* 确保图片覆盖 */
	}

    .sticks-area {
      position: relative;
      width: 150px;
      height: 150px;
      margin-top: -35px;
    }

    .stick {
      position: absolute;
      bottom: 15px;
      width: 10px;
      background: linear-gradient(145deg, #c9a87c, #9c6f4b);
      border-radius: 5px 5px 0 0;
      transform-origin: bottom center;
      box-shadow: 0 4px 5px rgba(0,0,0,0.2);
      transition: all 0.1s;
    }

    .hint-text {
      font-size: 15px;
      color: #b08365;
      background: rgba(255, 250, 235, 0.8);
      padding: 8px 25px;
      border-radius: 40px;
      border: 1px solid #eaccb5;
      margin: 25px 0 15px;
    }

    /* 原地上升消失的飞签 */
    .fly-stick {
      position: fixed;
      width: 12px;
      height: 70px;
      background: linear-gradient(145deg, #dbb48b, #a5714f);
      border-radius: 6px 6px 0 0;
      box-shadow: 0 6px 12px rgba(0,0,0,0.3);
      pointer-events: none;
      z-index: 200;
      transform-origin: center;
      animation: riseUp 0.5s ease-out forwards;
    }

    @keyframes riseUp {
      0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
      70% { transform: translateY(-120px) rotate(6deg) scale(0.8); opacity: 0.5; }
      100% { transform: translateY(-200px) rotate(10deg) scale(0.3); opacity: 0; }
    }

    /* 卡片浮层 */
    .card-mask {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: fadeIn 0.2s;
      backdrop-filter: blur(3px);
    }

    .card-content {
      width: 300px;
      background: #fff9ef;
      border-radius: 40px;
      padding: 40px 25px;
      box-shadow: 0 20px 30px rgba(160, 90, 40, 0.4);
      border: 3px solid #f5d3b5;
      transform: scale(1);
      animation: popIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-align: center;
    }

    .topic-flower {
      font-family: 'KaiTi', '华文楷体', 'cursive', serif;
      font-size: 30px;
      color: #b45a3b;
      line-height: 1.4;
      text-shadow: 2px 2px 0 #ffdac5, 3px 3px 0 rgba(255, 160, 100, 0.3);
      margin-bottom: 30px;
      word-break: break-word;
    }

    .close-btn {
      background: #ffaaa5;
      border: none;
      color: white;
      font-size: 18px;
      padding: 12px 30px;
      border-radius: 50px;
      width: fit-content;
      margin: 0 auto;
      box-shadow: 0 5px 0 #c06b5a;
      transition: 0.1s;
      font-weight: 500;
      cursor: pointer;
    }

    .close-btn:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #c06b5a;
    }

    /* ---------- 底部导航 ---------- */
    .bottom-nav {
      display: flex;
      background: #ffeada;
      border-top: 2px solid #f5c9ae;
      padding: 8px 0;
      flex-shrink: 0;
    }

    .nav-item {
      flex: 1;
      text-align: center;
      padding: 8px 0;
      font-size: 16px;
      color: #a7623c;
      cursor: pointer;
      transition: 0.2s;
      border-radius: 30px;
      margin: 0 6px;
    }

    .nav-item.active {
      background: #ffceb4;
      color: #884a2d;
      font-weight: 500;
    }

    /* ---------- 添加话题页 ---------- */
    .add-title {
      font-size: 26px;
      font-weight: 600;
      color: #b45a3b;
      text-align: center;
      margin: 15px 0 5px;
    }

    .add-tip {
      font-size: 14px;
      color: #a17a60;
      text-align: center;
      margin-bottom: 20px;
    }

    .topic-textarea {
      width: 100%;
      min-height: 180px;
      background: #fffcf5;
      border-radius: 24px;
      padding: 18px;
      font-size: 16px;
      color: #3b2a1e;
      border: 2px solid #ebc7a8;
      margin-bottom: 25px;
      resize: none;
      line-height: 1.5;
    }

    .btn-group {
      display: flex;
      justify-content: space-around;
      gap: 12px;
      margin-bottom: 30px;
    }

    .btn-save, .btn-back-home {
      flex: 1;
      background: #ffaaa5;
      color: white;
      border: none;
      font-size: 18px;
      padding: 14px 0;
      border-radius: 40px;
      box-shadow: 0 5px 0 #c06b5a;
      cursor: pointer;
      text-align: center;
      font-weight: 500;
    }

    .btn-back-home {
      background: #f5d3b5;
      color: #7a543c;
      box-shadow: 0 5px 0 #b7805a;
    }

    .btn-save:active, .btn-back-home:active {
      transform: translateY(4px);
      box-shadow: none;
    }

    .preview-area {
      background: #faebdd;
      border-radius: 24px;
      padding: 18px;
      border: 2px dashed #d99e6f;
    }

    .preview-title {
      font-size: 18px;
      font-weight: 600;
      color: #9b6e52;
      margin-bottom: 12px;
    }

    .preview-item {
      font-size: 16px;
      color: #63422e;
      padding: 8px 0;
      border-bottom: 1px solid #eaccb5;
      word-break: break-word;
    }

    .preview-item:last-child {
      border-bottom: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }

    @keyframes popIn {
      from { transform: scale(0.6); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="phone-frame" id="app">
    <div class="app-header">心动的信号</div>
    <div class="sub-header">From: Zero(wz1065062904)</div>

    <!-- 页面容器：两个页面切换 -->
    <div class="page-container" id="pageContainer">
      <!-- 首页抽签 -->
      <div class="page active" id="homePage">
        <div class="bucket-wrapper" id="bucketWrapper">
          <div class="bucket" id="bucket">
            <!-- 约会聊天卡通图片 -->
            <img class="bucket-image" src="https://pic.616pic.com/bg_w1180/00/08/25/9xLe0QOggC.jpg" alt="约会背景">
            <div class="sticks-area" id="sticksContainer">
              <!-- 签子由js动态渲染 -->
            </div>
          </div>
          <div class="hint-text" id="clickHint">轻点屏幕 抽取签子</div>
        </div>
      </div>

      <!-- 添加话题页 -->
      <div class="page" id="addPage">
        <div class="add-title">✏️ 手动添加话题</div>
        <div class="add-tip">一行一条话题，自动识别分段</div>
        <textarea class="topic-textarea" id="topicInput" placeholder="例如：&#10;你最近单曲循环的一首歌&#10;小时候做过最勇敢的事&#10;最想尝试的极限运动"></textarea>
        <div class="btn-group">
          <button class="btn-save" id="saveTopicsBtn">保存到话题库</button>
          <button class="btn-back-home" id="backHomeBtn">返回抽签</button>
        </div>
        <div class="preview-area" id="previewArea" style="display: none;">
          <div class="preview-title">将添加以下话题：</div>
          <div id="previewList"></div>
        </div>
      </div>
    </div>

    <!-- 底部导航 -->
    <div class="bottom-nav">
      <div class="nav-item active" data-page="home">💑 抽签</div>
      <div class="nav-item" data-page="add">📝 添加</div>
    </div>
  </div>

  <script>
    (function() {
      // ----- 全局数据 -----
      const STORAGE_KEY = 'heart_topics';
      // 默认话题（符合要求）
      const DEFAULT_TOPICS = [
        "分享一件今天发生在办公室的趣事",
        "你最近一次旅行最难忘的瞬间",
        "推荐一部最近看过的好电影",
        "你家乡最特别的风俗是什么？",
        "你理想中的周末是什么样子？",
        "你有什么坚持了三年以上的兴趣？",
        "你和宠物之间最暖心的小故事",
        "最近学会的一项新技能或小情趣",
        "如果可以瞬间学会一门手艺，你想学什么？",
        "你最喜欢的一处城市角落是哪里？",
        "你做过最拿手的一道菜是什么？",
        "如果明天不用上班/上学，你最想做什么？",
        "分享一个让你笑出声的短视频或段子",
        "你最近单曲循环的一首歌是？",
        "有没有一个地方，你去了还想再去？",
        "你小时候养过什么宠物？它叫什么名字？",
        "最近有没有尝试新的发型或穿搭风格？",
        "你最喜欢的季节是？为什么？",
        "有没有一部电影你看了三遍以上？",
        "你学会的最有用的生活小技巧是什么？",
        "分享一件你今天遇到的小确幸",
        "你最喜欢的运动或锻炼方式是什么？",
        "如果你能瞬移去世界任何一个地方，你会去哪儿？",
        "你听过最好笑的谐音梗是什么？",
        "最近有没有种花/养绿植？",
        "你小时候最想成为什么样的人？",
        "你最喜欢的一家咖啡馆/书店是哪里？",
        "有没有一种味道让你想起某个美好的回忆？",
        "你最近读过的一本好书是什么？",
        "你手机相册里最新的一张照片是什么？",
        "你最喜欢的综艺节目或纪录片是什么？",
        "分享一个你最近才学会的新技能（哪怕很小）",
        "如果你可以和一位名人共进晚餐，你想选谁？",
        "你理想中的房子要有什么特别的设计？",
        "你平时靠什么方法解压？",
        "你最喜欢的一类社交媒体内容是什么？",
        "有没有一首歌能代表你现在的心情？",
        "你最近有没有被种草什么好物？",
        "你最喜欢的一句台词或歌词是什么？",
        "如果给你一整天空闲，你会怎么安排？"
      ];

      // 当前总话题池 (去重后的全部)
      let allTopics = [];
      // 当前剩余未抽话题池 (不重复抽取)
      let remainingTopics = [];

      // 加载存储的话题，合并默认
      function loadTopics() {
        try {
          const stored = localStorage.getItem(STORAGE_KEY);
          if (stored) {
            const parsed = JSON.parse(stored);
            if (Array.isArray(parsed) && parsed.length) {
              // 与默认合并去重
              const combined = [...DEFAULT_TOPICS, ...parsed];
              allTopics = [...new Set(combined)];
              // 剩余话题初始化为全部 (打乱一下顺序也可以，但不必须)
              remainingTopics = [...allTopics];
              return;
            }
          }
        } catch (e) {}
        allTopics = [...DEFAULT_TOPICS];
        remainingTopics = [...allTopics];
      }
      loadTopics();

      // 保存话题到存储 (合并新话题，并更新剩余池)
      function saveTopicsToStorage(newTopicsArray) {
        // 过滤出真正新增的话题 (不在allTopics中的)
        const trulyNew = newTopicsArray.filter(t => !allTopics.includes(t));
        if (trulyNew.length === 0) {
          alert('所有话题都已存在，没有新增');
          return 0;
        }
        // 加入总池
        allTopics.push(...trulyNew);
        // 同时加入剩余池 (新话题默认未抽过)
        remainingTopics.push(...trulyNew);
        // 保存到localStorage (只保存总池)
        localStorage.setItem(STORAGE_KEY, JSON.stringify(allTopics));
        return trulyNew.length;
      }

      // ----- 页面元素 -----
      const homePage = document.getElementById('homePage');
      const addPage = document.getElementById('addPage');
      const navItems = document.querySelectorAll('.nav-item');
      const sticksContainer = document.getElementById('sticksContainer');
      const bucketWrapper = document.getElementById('bucketWrapper');
      const clickHint = document.getElementById('clickHint');
      const topicInput = document.getElementById('topicInput');
      const previewArea = document.getElementById('previewArea');
      const previewList = document.getElementById('previewList');
      const saveBtn = document.getElementById('saveTopicsBtn');
      const backHomeBtn = document.getElementById('backHomeBtn');

      // 当前状态
      let stickCount = 8;                // 筒内签子数量 (视觉用)
      let animating = false;             // 是否正在抽签动画
      let showCard = false;              // 是否显示卡片
      let lastShakeTime = 0;

      // 渲染签子
      function renderSticks() {
        let html = '';
        for (let i = 0; i < stickCount; i++) {
          const height = 45 + (i % 3) * 8;
          const left = 20 + i * 12;
          html += `<div class="stick" style="height: ${height}px; left: ${left}px; bottom: 10px;"></div>`;
        }
        sticksContainer.innerHTML = html;
      }

      // 显示卡片
      function showTopicCard(topic) {
        if (showCard) return;
        showCard = true;

        const mask = document.createElement('div');
        mask.className = 'card-mask';
        mask.id = 'topicCardMask';
        mask.innerHTML = `
          <div class="card-content">
            <div class="topic-flower">${topic}</div>
            <div class="close-btn" id="closeCardBtn">收起来</div>
          </div>
        `;
        document.getElementById('app').appendChild(mask);

        document.getElementById('closeCardBtn').addEventListener('click', function() {
          mask.remove();
          showCard = false;
          // 重置签筒数量
          if (stickCount <= 0) stickCount = 8;
          renderSticks();
        });
      }

      // 抽签核心逻辑 (不重复)
      function performDraw() {
        if (animating || showCard) return;

        // 检查剩余话题池
        if (remainingTopics.length === 0) {
          // 一轮已抽完，重置剩余池 (重新洗牌)
          if (allTopics.length === 0) {
            alert('话题库为空，请先添加话题');
            return;
          }
          remainingTopics = [...allTopics];
          // 可提示用户新的一轮开始
          alert('所有话题已抽完，重新开始新的一轮');
        }

        // 随机选取一个话题 (从remainingTopics中)
        const randomIndex = Math.floor(Math.random() * remainingTopics.length);
        const pickedTopic = remainingTopics[randomIndex];
        // 从剩余池移除
        remainingTopics.splice(randomIndex, 1);

        animating = true;

        // 视觉：减少一根签子
        if (stickCount > 0) {
          stickCount--;
        }
        renderSticks();

        // 创建飞签动画 (原地上升消失)
        const bucketRect = bucketWrapper.getBoundingClientRect();
        const flyStick = document.createElement('div');
        flyStick.className = 'fly-stick';
        // 起始位置在卡片中心偏下
        flyStick.style.left = (bucketRect.left + 140) + 'px';
        flyStick.style.top = (bucketRect.top + 150) + 'px';
        flyStick.style.position = 'fixed';
        document.body.appendChild(flyStick);

        flyStick.addEventListener('animationend', function() {
          flyStick.remove();
        });

        // 延迟显示卡片
        setTimeout(() => {
          showTopicCard(pickedTopic);
          animating = false;
        }, 500);
      }

      // 摇一摇监听
      function handleDeviceMotion(event) {
        const acceleration = event.accelerationIncludingGravity;
        if (!acceleration) return;
        const now = Date.now();
        const delta = 300;
        if (now - lastShakeTime < delta) return;

        const { x, y, z } = acceleration;
        if (Math.abs(x) > 12 || Math.abs(y) > 12 || Math.abs(z) > 12) {
          lastShakeTime = now;
          performDraw();
        }
      }

      if (window.DeviceMotionEvent) {
        window.addEventListener('devicemotion', handleDeviceMotion);
      } else {
        clickHint.innerText = '此设备不支持摇一摇，请点击抽签';
      }

      // 点击卡片抽签
      bucketWrapper.addEventListener('click', function(e) {
        e.stopPropagation();
        performDraw();
      });

      // 导航切换
      navItems.forEach(item => {
        item.addEventListener('click', function() {
          const page = this.dataset.page;
          navItems.forEach(n => n.classList.remove('active'));
          this.classList.add('active');

          if (page === 'home') {
            homePage.classList.add('active');
            addPage.classList.remove('active');
          } else {
            homePage.classList.remove('active');
            addPage.classList.add('active');
            updatePreview();
          }
        });
      });

      backHomeBtn.addEventListener('click', function() {
        navItems[0].click();
      });

      // 输入预览
      topicInput.addEventListener('input', function(e) {
        updatePreview(e.target.value);
      });

      function updatePreview(text) {
        const raw = text !== undefined ? text : topicInput.value;
        const lines = raw.split('\n').map(line => line.trim()).filter(line => line !== '');
        if (lines.length > 0) {
          previewArea.style.display = 'block';
          previewList.innerHTML = lines.map((line, idx) => `<div class="preview-item">${idx+1}. ${line}</div>`).join('');
        } else {
          previewArea.style.display = 'none';
        }
        return lines;
      }

      // 保存话题
      saveBtn.addEventListener('click', function() {
        const raw = topicInput.value;
        const lines = raw.split('\n').map(line => line.trim()).filter(line => line !== '');
        if (lines.length === 0) {
          alert('请输入有效话题');
          return;
        }

        const addedCount = saveTopicsToStorage(lines);
        if (addedCount > 0) {
          alert(`成功添加 ${addedCount} 条新话题`);
          topicInput.value = '';
          previewArea.style.display = 'none';
          previewList.innerHTML = '';
        }
        // 如果添加数为0，已经在函数内alert
      });

      // 初始化
      renderSticks();

      // 清理摇一摇
      window.addEventListener('beforeunload', function() {
        window.removeEventListener('devicemotion', handleDeviceMotion);
      });
    })();
  </script>
</body>
</html>
